<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Check-in Pernikahan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>Check-in Pernikahan</h2>

<div id="reader"></div>

<div id="hasil"></div>

<!-- 🔊 AUDIO -->
<audio id="beepSuccess">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
</audio>

<audio id="beepDuplicate">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<audio id="beepError">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>

let audioUnlocked = false;
let isProcessing = false;
let html5QrcodeScanner;

// 🔓 unlock audio (wajib HP)
function unlockAudio(){
  if(audioUnlocked) return;

  [beepSuccess, beepDuplicate, beepError].forEach(a => {
    try{
      a.play().then(()=>{ a.pause(); a.currentTime = 0; });
    }catch(e){}
  });

  audioUnlocked = true;
}

document.addEventListener("click", unlockAudio);
document.addEventListener("touchstart", unlockAudio);

// 🔊 sound
function playSound(type){
  let audio;

  if(type === "success"){
    audio = document.getElementById("beepSuccess");
  }
  else if(type === "duplicate"){
    audio = document.getElementById("beepDuplicate");
  }
  else{
    audio = document.getElementById("beepError");
  }

  if(!audio) return;

  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

// 📷 scan QR
function onScanSuccess(decodedText){

  // 🚫 anti double scan
  if(isProcessing) return;
  isProcessing = true;

  fetch(
    "https://script.google.com/macros/s/AKfycbwLo68xwUnvQogIwIbktbXZi8bHQvN4hfEvxZJ1Y3kidpJq7RfOTmU3PJgISBu5J9Hd/exec",
    {
      method:"POST",
      body:new URLSearchParams({
        id: decodedText
      })
    }
  )
  .then(r => r.json())
  .then(data => {

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML =
      "✅ " + data.nama;

      playSound("success");
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML =
      "⚠️ " + data.nama + " sudah hadir";

      playSound("duplicate");
    }

    else{
      document.getElementById("hasil").innerHTML =
      "❌ ID tidak ditemukan";

      playSound("error");
    }

  })
  .finally(() => {

    // 📷 STOP scanner sementara (anti spam kamera)
    if(html5QrcodeScanner){
      html5QrcodeScanner.clear().then(() => {

        setTimeout(() => {

          // reset lock
          isProcessing = false;

          // restart scanner
          html5QrcodeScanner.render(onScanSuccess);

        }, 2000); // jeda 2 detik

      }).catch(()=>{

        isProcessing = false;

      });
    }

  });

}

// 📷 init scanner
html5QrcodeScanner = new Html5QrcodeScanner(
  "reader",
  {
    fps:10,
    qrbox:250
  }
);

html5QrcodeScanner.render(onScanSuccess);

</script>

</body>
</html>

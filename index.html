<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CHECK-IN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

/* 🔥 OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:white;
  z-index:9999;
  animation: fadeIn 0.15s ease-in;
}

#overlay.success{
  background:rgba(0, 200, 0, 0.9);
}

#overlay.error{
  background:rgba(255, 0, 0, 0.9);
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>

</head>

<body>

<h2>Check-in Pernikahan</h2>

<div id="reader"></div>
<div id="hasil"></div>

<div id="overlay"></div>

<!-- 🔊 AUDIO -->
<audio id="beepSuccess" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<audio id="beepDuplicate" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<audio id="beepError" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>

let isProcessing = false;
let lastScan = 0;
let scanner;

// 🔓 unlock audio
document.addEventListener("click", () => {
  [beepSuccess, beepDuplicate, beepError].forEach(a => {
    try{
      a.play().then(()=>{ a.pause(); a.currentTime = 0; });
    }catch(e){}
  });
}, { once:true });

// 🔊 sound
function playSound(type){
  let audio;

  if(type === "success"){
    audio = document.getElementById("beepSuccess");
  }
  else if(type === "duplicate"){
    audio = document.getElementById("beepDuplicate");
  }
  else{
    audio = document.getElementById("beepError");
  }

  if(!audio) return;

  audio.pause();
  audio.currentTime = 0;

  audio.play().catch(()=>{});
}

// 🔥 overlay
function showOverlay(type, text){
  const overlay = document.getElementById("overlay");

  overlay.className = type;
  overlay.innerHTML = text;
  overlay.style.display = "flex";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 1000);
}

// 📷 scan QR (FAST MODE)
function onScanSuccess(decodedText){

  const now = Date.now();

  // ⚡ anti spam super cepat (0.6 detik)
  if(now - lastScan < 600) return;
  lastScan = now;

  if(isProcessing) return;
  isProcessing = true;

  fetch(
    "https://script.google.com/macros/s/AKfycbwLo68xwUnvQogIwIbktbXZi8bHQvN4hfEvxZJ1Y3kidpJq7RfOTmU3PJgISBu5J9Hd/exec",
    {
      method:"POST",
      body:new URLSearchParams({
        id: decodedText
      })
    }
  )
  .then(r => r.json())
  .then(data => {

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML =
      "✅ " + data.nama;

      playSound("success");
      showOverlay("success", "BERHASIL");
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML =
      "⚠️ " + data.nama + " sudah hadir";

      playSound("duplicate");
      showOverlay("error", "SUDAH HADIR");
    }

    else{
      document.getElementById("hasil").innerHTML =
      "❌ ID tidak ditemukan";

      playSound("error");
      showOverlay("error", "TIDAK DITEMUKAN");
    }

  })
  .finally(() => {

    // ⚡ unlock cepat
    setTimeout(() => {
      isProcessing = false;
    }, 600);

  });

}

// 📷 init scanner (NO RESTART = FAST)
scanner = new Html5QrcodeScanner(
  "reader",
  {
    fps:12,
    qrbox:250
  }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHECK-IN SYSTEM</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  font-size:22px;
  margin-top:15px;
  font-weight:bold;
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:#fff;
  z-index:9999;
}

#overlay.success{background:rgba(0,200,0,0.9);}
#overlay.error{background:rgba(255,0,0,0.9);}
</style>
</head>

<body>

<h2>CHECK-IN SYSTEM</h2>

<div id="reader"></div>

<button onclick="switchCamera()">🔄 Ganti Kamera</button>

<div id="hasil"></div>
<div id="overlay"></div>

<script>

const MODE = "checkin"; 
// ubah ke "souvenir" jika perlu

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzJVJF6yi7JomWVz8svm44FfZsKVYP8xHQ85SoN_uEhjU9MaQJsQh-onB4NrWz7oPc/exec";

let html5QrCode;
let cameras = [];
let currentCam = 0;
let busy = false;

// 🔊 SOUND SIMPLE (stabil iOS + Android)
function beep(type){
  const audio = new Audio(
    type === "ok"
      ? "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
      : type === "dup"
      ? "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
      : "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
  );

  audio.play().catch(()=>{});
}

// 🔥 OVERLAY
function show(type, text){
  const o = document.getElementById("overlay");
  o.className = type;
  o.innerHTML = text;
  o.style.display = "flex";
  setTimeout(()=>o.style.display="none",900);
}

// 📡 HANDLE RESULT
function handleResult(decodedText){

  fetch(SCRIPT_URL,{
    method:"POST",
    body:new URLSearchParams({
      id: decodedText,
      mode: MODE
    })
  })
  .then(r=>r.json())
  .then(data=>{

    if(MODE === "checkin"){

      if(data.status === "success"){
        document.getElementById("hasil").innerHTML = "✅ " + data.nama;
        beep("ok");
        show("success","BERHASIL CHECK-IN");
      }

      else if(data.status === "duplicate"){
        document.getElementById("hasil").innerHTML = "⚠️ " + data.nama;
        beep("dup");
        show("error","SUDAH CHECK-IN");
      }

      else{
        document.getElementById("hasil").innerHTML = "❌ TIDAK VALID";
        beep("err");
        show("error","ERROR");
      }
    }

    else if(MODE === "souvenir"){

      if(data.status === "not_checked_in"){
        document.getElementById("hasil").innerHTML = "❌ BELUM HADIR";
        beep("err");
        show("error","BELUM CHECK-IN");
      }

      else if(data.status === "already_taken"){
        document.getElementById("hasil").innerHTML = "⚠️ SUDAH AMBIL";
        beep("dup");
        show("error","SUDAH AMBIL");
      }

      else{
        document.getElementById("hasil").innerHTML = "🎁 " + data.nama;
        beep("ok");
        show("success","SOUVENIR OK");
      }

    }

  });

}

// 📷 INIT CAMERA
Html5Qrcode.getCameras().then(devices => {

  if(!devices.length) return;

  cameras = devices;

  let back = devices.findIndex(d =>
    d.label.toLowerCase().includes("back") ||
    d.label.toLowerCase().includes("environment")
  );

  currentCam = back !== -1 ? back : 0;

  html5QrCode = new Html5Qrcode("reader");

  startCamera(cameras[currentCam]);

});

// ▶️ START CAMERA
function startCamera(camera){

  html5QrCode.start(
    camera.id,
    { fps: 18, qrbox: 220 },
    (decodedText)=>{

      if(busy) return;
      busy = true;

      handleResult(decodedText);

      setTimeout(()=>busy=false,800);
    }
  );

}

// 🔄 SWITCH CAMERA
function switchCamera(){

  if(cameras.length < 2) return;

  html5QrCode.stop().then(()=>{

    currentCam = (currentCam + 1) % cameras.length;

    startCamera(cameras[currentCam]);

  });

}

</script>

</body>
</html>

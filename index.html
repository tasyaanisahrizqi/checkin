<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHECK-IN INSTANT</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:white;
  z-index:9999;
}

#overlay.success{background:rgba(0,200,0,0.9);}
#overlay.error{background:rgba(255,0,0,0.9);}
</style>
</head>

<body>

<h2>Check-in Pernikahan</h2>

<div id="reader"></div>
<div id="hasil"></div>
<div id="overlay"></div>

<!-- AUDIO -->
<audio id="ok">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<audio id="no">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let scanner;
let busy = false;

// 🔊 sound
function sound(type){
  let a = document.getElementById(type === "ok" ? "ok" : "no");
  a.currentTime = 0;
  a.play().catch(()=>{});
}

// 🔥 overlay
function show(type, text){
  let o = document.getElementById("overlay");
  o.className = type;
  o.innerHTML = text;
  o.style.display = "flex";
  setTimeout(()=> o.style.display="none", 800);
}

// 📷 INSTANT SCAN
async function onScanSuccess(decodedText){

  if(busy) return;
  busy = true;

  // ⛔ STOP SCANNER SEMENTARA (INI KUNCI SPEED + ANTI DOUBLE)
  await scanner.pause(true);

  fetch("https://script.google.com/macros/s/AKfycbwLo68xwUnvQogIwIbktbXZi8bHQvN4hfEvxZJ1Y3kidpJq7RfOTmU3PJgISBu5J9Hd/exec",{
    method:"POST",
    body:new URLSearchParams({id:decodedText})
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML="✅ "+data.nama;
      sound("ok");
      show("success","BERHASIL");
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML="⚠️ "+data.nama+" sudah hadir";
      sound("no");
      show("error","SUDAH HADIR");
    }

    else{
      document.getElementById("hasil").innerHTML="❌ ID tidak ditemukan";
      sound("no");
      show("error","TIDAK DITEMUKAN");
    }

  })
  .finally(async ()=>{

    // 🚀 langsung hidupkan lagi scanner (NO DELAY FIX)
    await scanner.resume();
    busy = false;

  });

}

// 📷 init scanner (FAST MODE)
scanner = new Html5QrcodeScanner("reader",{
  fps: 15,
  qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Check-in Pernikahan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

</style>

</head>

<body>

<h2>Check-in Pernikahan</h2>

<div id="reader"></div>

<div id="hasil"></div>

<script>

function onScanSuccess(decodedText){

  fetch(
    "https://script.google.com/macros/s/AKfycbwLo68xwUnvQogIwIbktbXZi8bHQvN4hfEvxZJ1Y3kidpJq7RfOTmU3PJgISBu5J9Hd/exec",
    {
      method:"POST",
      body:new URLSearchParams({
        id: decodedText
      })
    }
  )
  .then(r => r.json())
  .then(data => {

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML =
      "✅ " + data.nama;
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML =
      "⚠️ " + data.nama + " sudah hadir";
    }

    else{
      document.getElementById("hasil").innerHTML =
      "❌ ID tidak ditemukan";
    }

  });

}

new Html5QrcodeScanner(
  "reader",
  {
    fps:10,
    qrbox:250
  }
).render(onScanSuccess);

</script>

</body>
</html>

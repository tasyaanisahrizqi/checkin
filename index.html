<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHECK-IN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:white;
  z-index:9999;
  animation: fadeIn 0.15s ease-in;
}

#overlay.success{background:rgba(0,200,0,0.9);}
#overlay.error{background:rgba(255,0,0,0.9);}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>

</head>

<body>

<h2>Check-in Pernikahan</h2>

<div id="reader"></div>
<div id="hasil"></div>
<div id="overlay"></div>

<!-- 🔊 AUDIO 3 JENIS -->
<audio id="ok" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<audio id="dup" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" type="audio/ogg">
</audio>

<audio id="err" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

let scanner;
let busy = false;

// 🔊 SOUND ENGINE
function sound(type){

  let a;

  if(type === "ok"){
    a = document.getElementById("ok");
  }
  else if(type === "dup"){
    a = document.getElementById("dup");
  }
  else{
    a = document.getElementById("err");
  }

  if(!a) return;

  a.pause();
  a.currentTime = 0;

  a.play().catch(()=>{});
}

// 🔥 OVERLAY
function show(type, text){
  let o = document.getElementById("overlay");
  o.className = type;
  o.innerHTML = text;
  o.style.display = "flex";

  setTimeout(()=>{
    o.style.display="none";
  }, 900);
}

// 📷 SCAN QR (FAST MODE)
async function onScanSuccess(decodedText){

  if(busy) return;
  busy = true;

  await scanner.pause(true);

  fetch("https://script.google.com/macros/s/AKfycbwLo68xwUnvQogIwIbktbXZi8bHQvN4hfEvxZJ1Y3kidpJq7RfOTmU3PJgISBu5J9Hd/exec",{
    method:"POST",
    body:new URLSearchParams({id:decodedText})
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML="✅ "+data.nama;
      sound("ok");
      show("success","BERHASIL");
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML="⚠️ "+data.nama+" sudah hadir";
      sound("dup");
      show("error","SUDAH HADIR");
    }

    else{
      document.getElementById("hasil").innerHTML="❌ ID tidak ditemukan";
      sound("err");
      show("error","TIDAK DITEMUKAN");
    }

  })
  .finally(async ()=>{

    await scanner.resume();
    busy = false;

  });

}

// 📷 INIT SCANNER
scanner = new Html5QrcodeScanner("reader",{
  fps: 15,
  qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>

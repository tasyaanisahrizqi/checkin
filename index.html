<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHECK-IN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:white;
  z-index:9999;
}

#overlay.success{background:rgba(0,200,0,0.9);}
#overlay.error{background:rgba(255,0,0,0.9);}
</style>

</head>

<body>

<h2>CHECK-IN</h2>

<div id="reader"></div>
<div id="hasil"></div>
<div id="overlay"></div>

<audio id="ok" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<audio id="dup" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<audio id="err" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">
</audio>

<script>

let html5QrCode;
let cameraList = [];
let currentCameraIndex = 0;
let busy = false;

// SOUND
function sound(type){
  let a =
    type === "ok" ? document.getElementById("ok") :
    type === "dup" ? document.getElementById("dup") :
    document.getElementById("err");

  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

// OVERLAY
function show(type,text){
  let o=document.getElementById("overlay");
  o.className=type;
  o.innerHTML=text;
  o.style.display="flex";

  setTimeout(()=>o.style.display="none",900);
}

// FETCH
function handleResult(decodedText){

  fetch("https://script.google.com/macros/s/AKfycbxtCw1dooE8WQzb6PKUNIRr8FT2bkzzEfCUJtyj627SE48sgInj6IY7Z2UV4y8RtYksUQ/exec",{
    method:"POST",
    body:new URLSearchParams({id:decodedText})
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.status==="success"){
      document.getElementById("hasil").innerHTML="✅ "+data.nama;
      sound("ok");
      show("success","BERHASIL");
    }

    else if(data.status==="duplicate"){
      document.getElementById("hasil").innerHTML="⚠️ "+data.nama+" sudah hadir";
      sound("dup");
      show("error","SUDAH HADIR");
    }

    else{
      document.getElementById("hasil").innerHTML="❌ ID tidak ditemukan";
      sound("err");
      show("error","TIDAK DITEMUKAN");
    }

  });

}

// CAMERA INIT
Html5Qrcode.getCameras().then(devices=>{

  cameraList=devices;

  let backIndex = devices.findIndex(c =>
    c.label.toLowerCase().includes("back") ||
    c.label.toLowerCase().includes("rear") ||
    c.label.toLowerCase().includes("environment")
  );

  currentCameraIndex = backIndex !== -1 ? backIndex : 0;

  html5QrCode = new Html5Qrcode("reader");

  startCamera(cameraList[currentCameraIndex]);

});

function startCamera(camera){

  html5QrCode.start(
    camera.id,
    {fps:15, qrbox:250},
    (decodedText)=>{

      if(busy) return;
      busy=true;

      html5QrCode.pause(true);

      handleResult(decodedText);

      setTimeout(()=>{
        html5QrCode.resume();
        busy=false;
      },600);

    }
  );
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHECK-IN</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#hasil{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  color:white;
  z-index:9999;
  animation: fadeIn 0.15s ease-in;
}

#overlay.success{background:rgba(0,200,0,0.9);}
#overlay.error{background:rgba(255,0,0,0.9);}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>

</head>

<body>

<h2>CHECK-IN</h2>

<div id="reader"></div>

<div id="hasil"></div>
<div id="overlay"></div>

<script>

const MODE = "checkin";

let html5QrCode;
let busy = false;

function sound(type){

  let a;

  if(type === "ok"){
    a = document.getElementById("ok");
  }
  else if(type === "dup"){
    a = document.getElementById("dup");
  }
  else{
    a = document.getElementById("err");
  }

  if(!a) return;

  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

function show(type, text){
  let o = document.getElementById("overlay");
  o.className = type;
  o.innerHTML = text;
  o.style.display = "flex";

  setTimeout(()=>{
    o.style.display="none";
  }, 900);
}

function handleResult(decodedText){

  fetch("https://script.google.com/macros/s/AKfycbxtCw1dooE8WQzb6PKUNIRr8FT2bkzzEfCUJtyj627SE48sgInj6IY7Z2UV4y8RtYksUQ/exec",{
    method:"POST",
    body:new URLSearchParams({
      id: decodedText,
      mode: MODE
    })
  })
  .then(r => r.json())
  .then(data => {

    if(data.status === "success"){
      document.getElementById("hasil").innerHTML="✅ "+data.nama;
      sound("ok");
      show("success","BERHASIL");
    }

    else if(data.status === "duplicate"){
      document.getElementById("hasil").innerHTML="⚠️ "+data.nama+" sudah hadir";
      sound("dup");
      show("error","SUDAH HADIR");
    }

    else{
      document.getElementById("hasil").innerHTML="❌ ID tidak ditemukan";
      sound("err");
      show("error","TIDAK DITEMUKAN");
    }

  });

}

html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  { fps: 15, qrbox: 250 },
  (decodedText) => {

    if(busy) return;

    busy = true;

    html5QrCode.pause(true);

    handleResult(decodedText);

    setTimeout(()=>{
      html5QrCode.resume();
      busy = false;
    }, 600);

  }
)
.catch(err => {
  console.error("Camera error:", err);
});

</script>

<audio id="ok" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<audio id="dup" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<audio id="err" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">
</audio>

</body>
</html>
